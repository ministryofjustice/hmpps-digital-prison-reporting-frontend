  integration_tests:
    runs-on: ubuntu-latest
    needs: build

    services:
      redis:
        image: redis
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    strategy:
      matrix:
        # Increase/decrease shards by editing this list AND the SHARDS variable below
        shard_index: [0, 1, 2]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          cache: 'npm'

      - run: npm ci

      # Keep your original prep steps
      - run: npm run setup
      - run: npm run package

      # -----------------------
      # Wait for Redis properly
      # -----------------------
      # Use wait-on to ensure TCP 6379 is accepting connections before starting the app.
      - name: Wait for Redis (TCP 6379)
        run: |
          echo "Waiting for Redis to accept connections on tcp:localhost:6379..."
          npx wait-on tcp:localhost:6379 --timeout 60000
          echo "Redis is ready."

      # -----------------------
      # Inline sharding (no external scripts)
      # -----------------------
      - name: Select spec files for this shard
        id: shard
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t FILES < <(find cypress-tests/integration-tests -type f -name "*.tests.cy.ts" | sort)
          TOTAL=${#FILES[@]}
          if [ "$TOTAL" -eq 0 ]; then
            echo "No spec files found matching pattern: cypress-tests/integration-tests/**/*.tests.cy.ts"
            exit 1
          fi

          # Keep SHARDS in sync with matrix length above
          SHARDS=3
          INDEX=${{ matrix.shard_index }}

          SLICE=$(( (TOTAL + SHARDS - 1) / SHARDS )) # ceil(TOTAL/SHARDS)
          START=$(( INDEX * SLICE ))

          # Bound check in case the last shard exceeds array length
          if [ "$START" -ge "$TOTAL" ]; then
            echo "This shard has no tests to run (start index $START >= total $TOTAL)."
            echo "specs=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          END=$(( START + SLICE ))
          if [ "$END" -gt "$TOTAL" ]; then END=$TOTAL; fi

          SELECTED=("${FILES[@]:$START:$((END-START))}")

          # Join as comma-separated list for Cypress
          SPECS=$(IFS=,; echo "${SELECTED[*]}")

          echo "This shard will run $((END-START)) spec(s) out of $TOTAL:"
          printf ' - %s\n' "${SELECTED[@]}"

          echo "specs=$SPECS" >> "$GITHUB_OUTPUT"

      # -----------------------
      # Start app (unique port per shard) and wait for it
      # -----------------------
      - name: Start server
        if: steps.shard.outputs.specs != ''
        env:
          PORT: ${{ 3000 + matrix.shard_index }}
        run: |
          echo "Starting app on PORT=$PORT ..."
          npm run start:dev:noMockClients:noLogs &
          echo "Waiting for app at http://localhost:$PORT ..."
          npx wait-on "http://localhost:$PORT" --timeout 60000
          echo "App is up."

      # -----------------------
      # Run Cypress for this shard
      # -----------------------
      - name: Run Cypress tests
        id: int-tests
        if: steps.shard.outputs.specs != ''
        env:
          CYPRESS_BASE_URL: http://localhost:${{ 3000 + matrix.shard_index }}
        run: |
          npx cypress run \
            --browser electron \
            --config "baseUrl=${CYPRESS_BASE_URL}" \
            --spec "${{ steps.shard.outputs.specs }}"

      # -----------------------
      # Artifacts (results, videos, screenshots)
      # -----------------------
      - uses: actions/upload-artifact@v4
        if: success() || failure()
        with:
          name: cypress-results-${{ matrix.shard_index }}
          path: test_results
          if-no-files-found: ignore

      - uses: actions/upload-artifact@v4
        if: success() || failure()
        with:
          name: cypress-videos-${{ matrix.shard_index }}
          path: cypress-tests/integration-tests/videos
          if-no-files-found: ignore

      - uses: actions/upload-artifact@v4
        if: success() || failure()
        with:
          name: cypress-screenshots-${{ matrix.shard_index }}
          path: cypress-tests/integration-tests/screenshots
          if-no-files-found: ignore

      # -----------------------
      # Final failure logic
      # -----------------------
      - name: Output success or failure
        if: success() || failure()
        run: |

  visual_regression_tests:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read

    services:
      redis:
        image: redis
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24.x'

      # Same as original workflow
      - run: npm run setup
      - run: npm run package

      # Count screenshots BEFORE running tests
      - name: Count screenshots before
        id: count-screenshots-before
        run: |
          echo -n "screenshots_before=$(find src/dpr/components/_dashboards/visual-regression-tests \
            -name '*.png' | wc -l | tr -d '[:space:]')" >> "$GITHUB_OUTPUT"

      # Install Playwright dependencies
      - name: Install Playwright dependencies
        run: |
          sudo apt update
          npx playwright install --with-deps

      # Run the visual regression tests for dashboards
      - name: Run visual regression tests
        run: npm run int-test-visual:ci

      # Count screenshots AFTER and compare
      - name: Count screenshots after
        id: count-screenshots-after
        run: |
          echo "screenshots before: ${{ steps.count-screenshots-before.outputs.screenshots_before }}"
          screenshots_after=$(find src/dpr/components/_dashboards/visual-regression-tests \
            -name '*.png' | wc -l | tr -d '[:space:]')
          echo "screenshots after: $screenshots_after"

          screenshot_diff=$((${{ steps.count-screenshots-before.outputs.screenshots_before }} - screenshots_after))

          # Identical behavior to original → fail if count changed
          if [ $screenshot_diff -eq 0 ]; then
            exit 0
          else
            exit 1
          fi

      # Package up all screenshots from test run
      - name: Package screenshots
        if: success() || failure()
        run: |
          mkdir screenshots
          find src/dpr/components/_dashboards/visual-regression-tests \
            -name '*.png' -exec cp {} screenshots \;

      # Upload screenshots artifact (pass/fail)
      - uses: actions/upload-artifact@v4
        name: Upload screenshots artifact
        if: success() || failure()
        with:
          name: vrt-screenshots
          path: screenshots

      # Upload Playwright test results
      - uses: actions/upload-artifact@v4
        name: Upload Playwright test results
        if: success() || failure()
        with:
          name: vrt-test-results
          path: test-results

      # Final failure logic (same as original)
      - name: Output success or failure
        if: success() || failure()
        run: |
          if [[ "${{ steps.count-screenshots-after.outcome }}" != "success" ]]; then
            echo 'Visual regression test screenshots number changed - new tests likely added!'
            exit 1
          else
            exit 0
          fi
