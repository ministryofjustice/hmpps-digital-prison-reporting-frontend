  integration_tests:
    runs-on: ubuntu-latest
    needs: build

    services:
      redis:
        image: redis
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    strategy:
      matrix:
        # Update this list when increasing the number of shards
        shard_index: [0, 1, 2, 3]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24.x'

      - run: npm ci

      # Your original build/setup steps
      - run: npm run setup
      - run: npm run package

      # =======================
      # WAIT FOR REDIS TO BE READY
      # =======================
      - name: Wait for Redis
        run: |
          echo "Waiting for Redis to become available..."
          for i in {1..30}; do
            if redis-cli ping > /dev/null 2>&1; then
              echo "Redis is ready!"
              break
            fi
            echo "Redis not ready yet... attempt $i"
            sleep 1
          done

      # =======================
      # SHARD SELECTION (inline)
      # =======================
      - name: Select spec files for this shard
        id: shard
        run: |
          FILES=($(find cypress-tests/integration-tests -type f -name "*.tests.cy.ts"))
          TOTAL=${#FILES[@]}
          SHARDS=4
          INDEX=${{ matrix.shard_index }}

          SLICE=$(( (TOTAL + SHARDS - 1) / SHARDS ))
          START=$(( INDEX * SLICE ))

          SELECTED=("${FILES[@]:$START:$SLICE}")
          SPECS=$(printf "%s," "${SELECTED[@]}")
          SPECS=${SPECS%,}

          echo "Specs for this shard: $SPECS"
          echo "specs=$SPECS" >> "$GITHUB_OUTPUT"

      # =======================
      # START NODE APP
      # =======================
      - name: Start server
        run: |
          PORT=$((3000 + ${{ matrix.shard_index }}))
          export PORT

          npm run start:dev:noMockClients:noLogs &

          # Wait for server to be reachable
          echo "Waiting for app on http://localhost:$PORT..."
          npx wait-on http://localhost:$PORT --timeout 60000

      # =======================
      # RUN CYPRESS FOR THIS SHARD
      # =======================
      - name: Run Cypress tests
        id: int-tests
        run: |
          npx cypress run \
            --browser electron \
            --config baseUrl=http://localhost:$((3000 + ${{ matrix.shard_index }})) \
            --spec "${{ steps.shard.outputs.specs }}"

      # =======================
      # CYPRESS ARTIFACTS
      # =======================
      - uses: actions/upload-artifact@v4
        if: success() || failure()
        with:
          name: cypress-results-${{ matrix.shard_index }}
          path: test_results

      - uses: actions/upload-artifact@v4
        if: success() || failure()
        with:
          name: cypress-videos-${{ matrix.shard_index }}
          path: cypress-tests/integration-tests/videos

      - uses: actions/upload-artifact@v4
        if: success() || failure()
        with:
          name: cypress-screenshots-${{ matrix.shard_index }}
          path: cypress-tests/integration-tests/screenshots

      # =======================
      # FINAL FAILURE LOGIC
      # =======================
      - name: Output success or failure
        if: success() || failure()
        run: |
          if [[ "${{ steps.int-tests.outcome }}" != "success" ]]; then
            echo "Integration tests failed for shard ${{ matrix.shard_index }}!"
            exit 1
          else
            echo "Shard ${{ matrix.shard_index }} passed."
          fi

  visual_regression_tests:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read

    services:
      redis:
        image: redis
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24.x'

      # Same as original workflow
      - run: npm run setup
      - run: npm run package

      # Count screenshots BEFORE running tests
      - name: Count screenshots before
        id: count-screenshots-before
        run: |
          echo -n "screenshots_before=$(find src/dpr/components/_dashboards/visual-regression-tests \
            -name '*.png' | wc -l | tr -d '[:space:]')" >> "$GITHUB_OUTPUT"

      # Install Playwright dependencies
      - name: Install Playwright dependencies
        run: |
          sudo apt update
          npx playwright install --with-deps

      # Run the visual regression tests for dashboards
      - name: Run visual regression tests
        run: npm run int-test-visual:ci

      # Count screenshots AFTER and compare
      - name: Count screenshots after
        id: count-screenshots-after
        run: |
          echo "screenshots before: ${{ steps.count-screenshots-before.outputs.screenshots_before }}"
          screenshots_after=$(find src/dpr/components/_dashboards/visual-regression-tests \
            -name '*.png' | wc -l | tr -d '[:space:]')
          echo "screenshots after: $screenshots_after"

          screenshot_diff=$((${{ steps.count-screenshots-before.outputs.screenshots_before }} - screenshots_after))

          # Identical behavior to original → fail if count changed
          if [ $screenshot_diff -eq 0 ]; then
            exit 0
          else
            exit 1
          fi

      # Package up all screenshots from test run
      - name: Package screenshots
        if: success() || failure()
        run: |
          mkdir screenshots
          find src/dpr/components/_dashboards/visual-regression-tests \
            -name '*.png' -exec cp {} screenshots \;

      # Upload screenshots artifact (pass/fail)
      - uses: actions/upload-artifact@v4
        name: Upload screenshots artifact
        if: success() || failure()
        with:
          name: vrt-screenshots
          path: screenshots

      # Upload Playwright test results
      - uses: actions/upload-artifact@v4
        name: Upload Playwright test results
        if: success() || failure()
        with:
          name: vrt-test-results
          path: test-results

      # Final failure logic (same as original)
      - name: Output success or failure
        if: success() || failure()
        run: |
          if [[ "${{ steps.count-screenshots-after.outcome }}" != "success" ]]; then
            echo 'Visual regression test screenshots number changed - new tests likely added!'
            exit 1
          else
            exit 0
          fi
