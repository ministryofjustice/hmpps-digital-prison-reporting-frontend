name: Build and test package

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          cache: 'npm'

      # install everything once
      - run: npm ci
      - run: npm run setup
      - run: npm run rpack

      # publish BOTH dist + node_modules
      - uses: actions/upload-artifact@v4
        with:
          name: dpr-package
          path: |
            dist
            node_modules
            package.json
            package-lock.json

  test:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24.x'
      - run: npm run setup
      - uses: actions/download-artifact@v4
        with:
          name: dpr-package
          path: dist
      - run: npm run test

  test_with_app:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    services:
      redis:
        image: redis
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22.x'
      - run: npm run setup

      - name: Clone mi-ui
        run: |
          git clone https://github.com/ministryofjustice/hmpps-digital-prison-reporting-mi-ui.git ../app
      - name: mi-ui setup using this branch
        run: npm run setup
        working-directory: ${{ github.workspace }}/../app
      - name: Build lib and copy output into node_modules of mi-ui for lib
        working-directory: ${{ github.workspace }}
        run: |
          npm run rpack
          rm -rf ../app/node_modules/@ministryofjustice/hmpps-digital-prison-reporting-frontend/*
          cp -R dist/* ../app/node_modules/@ministryofjustice/hmpps-digital-prison-reporting-frontend/
      - name: Build mi-ui
        run: npm run build
        working-directory: ${{ github.workspace }}/../app
      - name: mi-ui unit tests
        run: npm run test:ci
        working-directory: ${{ github.workspace }}/../app
      - name: Get wiremock
        run: curl -o wiremock.jar https://repo1.maven.org/maven2/com/github/tomakehurst/wiremock-standalone/2.27.1/wiremock-standalone-2.27.1.jar
        working-directory: ${{ github.workspace }}/../app
      - name: Run wiremock
        run: java -jar wiremock.jar --port 9091 &
        working-directory: ${{ github.workspace }}/../app
      - name: Run mi-ui
        run: npm run start-feature &
        working-directory: ${{ github.workspace }}/../app
      - name: Wait for mi-ui to start
        run: sleep 5
        working-directory: ${{ github.workspace }}/../app
      - name: mi-ui integration tests
        run: npm run int-test
        working-directory: ${{ github.workspace }}/../app

  integration_test:
    runs-on: ubuntu-latest
    needs: build

    services:
      redis:
        image: redis
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    strategy:
      matrix:
        shard_index: [0, 1, 2, 3] # Adjust as needed

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          cache: 'npm'

      # Download build outputs + node_modules from build job
      - uses: actions/download-artifact@v4
        with:
          name: dpr-package
          path: .

      # Fix executable permissions for esbuild/native binaries
      - name: Fix esbuild/native binary permissions
        run: |
          find node_modules -type f -path "*/@esbuild/*/bin/*" -exec chmod +x {} \;

      # Rebuild any native modules
      - run: npm rebuild

      # Restore required setup side effects (TS compile, configs, copy steps, etc.)
      - run: npm run setup

      # Install Cypress binary for this runner
      - name: Install Cypress binary
        run: |
          npx cypress install
          npx cypress verify

      # Wait for Redis
      - name: Wait for Redis
        run: |
          echo "Waiting for Redis on tcp:localhost:6379..."
          npx wait-on tcp:localhost:6379 --timeout 60000
          echo "Redis is ready!"

      # -------------------------
      # SHARD: pick files per shard
      # -------------------------
      - name: Select spec files for this shard
        id: shard
        shell: bash
        run: |
          set -euo pipefail

          # Collect test files
          mapfile -t FILES < <(
            ( find ./src -type f -name "*.cy.ts" ;
              find ./test-app -type f -name "*.cy.ts" ) | sort
          )

          TOTAL=${#FILES[@]}
          echo "Found $TOTAL Cypress spec files."

          SHARDS=4
          INDEX=${{ matrix.shard_index }}

          SLICE=$(( (TOTAL + SHARDS - 1) / SHARDS ))
          START=$(( INDEX * SLICE ))
          END=$(( START + SLICE ))
          if [ "$END" -gt "$TOTAL" ]; then END=$TOTAL; fi

          if [ "$START" -ge "$TOTAL" ]; then
            echo "Shard $INDEX has no specs."
            echo "specs=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          SELECTED=("${FILES[@]:$START:$((END-START))}")
          SPECS=$(IFS=,; echo "${SELECTED[*]}")

          echo "Shard $INDEX will run ${#SELECTED[@]} tests:"
          printf " - %s\n" "${SELECTED[@]}"

          echo "specs=$SPECS" >> "$GITHUB_OUTPUT"

      # -------------------------
      # Start WireMock manually per shard (isolated)
      # -------------------------
      - name: Start WireMock
        if: steps.shard.outputs.specs != ''
        shell: bash
        env:
          SHARD_INDEX: ${{ matrix.shard_index }}
        run: |
          set -euo pipefail

          # Compute dynamic port per shard
          WIREMOCK_PORT=$((9091 + SHARD_INDEX))
          echo "WIREMOCK_PORT=$WIREMOCK_PORT" >> "$GITHUB_ENV"

          echo "Starting WireMock on port $WIREMOCK_PORT..."

          # Download jar
          curl -L -o wiremock.jar \
            https://repo1.maven.org/maven2/com/github/tomakehurst/wiremock-standalone/2.27.1/wiremock-standalone-2.27.1.jar

          java -jar wiremock.jar --port "$WIREMOCK_PORT" > wiremock.log 2>&1 &

          npx wait-on "tcp:localhost:$WIREMOCK_PORT" --timeout 30000
          echo "WireMock is ready on $WIREMOCK_PORT"

      # -------------------------
      # START SERVER
      # -------------------------
      - name: Start server
        id: start-app
        if: steps.shard.outputs.specs != ''
        shell: bash
        env:
          PORT: 3010
        run: |
          set -euo pipefail

          echo "Starting app on PORT=$PORT..."
          PORT=$PORT npm run start:dev:noMockClients:noLogs > app.log 2>&1 &

          echo "Waiting for app on tcp:localhost:$PORT ..."
          npx wait-on "tcp:localhost:$PORT" --timeout 60000

          echo "App is ready."
          echo "---- app.log ----"
          tail -n 50 app.log | sed 's/^/[APP] /'
          echo "-----------------"

          echo "BASE_URL=http://localhost:$PORT" >> "$GITHUB_ENV"

      # -------------------------
      # RUN CYPRESS
      # -------------------------
      - name: Run Cypress
        id: int-tests
        if: steps.shard.outputs.specs != ''
        env:
          CYPRESS_BASE_URL: ${{ env.BASE_URL }}
          WIREMOCK_PORT: ${{ env.WIREMOCK_PORT }}
        run: |
          echo "Running Cypress with:"
          echo "  baseUrl        = $CYPRESS_BASE_URL"
          echo "  WireMock port  = $WIREMOCK_PORT"

          npx cypress run \
            --browser electron \
            --config "baseUrl=$CYPRESS_BASE_URL" \
            --spec "${{ steps.shard.outputs.specs }}"

      # Upload logs
      - name: Upload app log
        if: success() || failure()
        uses: actions/upload-artifact@v4
        with:
          name: app-log-${{ matrix.shard_index }}
          path: app.log
          if-no-files-found: ignore

      - name: Upload WireMock log
        if: success() || failure()
        uses: actions/upload-artifact@v4
        with:
          name: wiremock-log-${{ matrix.shard_index }}
          path: wiremock.log
          if-no-files-found: ignore

      # Upload Cypress artifacts
      - uses: actions/upload-artifact@v4
        if: success() || failure()
        with:
          name: cypress-results-${{ matrix.shard_index }}
          path: test_results
          if-no-files-found: ignore

      - uses: actions/upload-artifact@v4
        if: success() || failure()
        with:
          name: cypress-videos-${{ matrix.shard_index }}
          path: cypress-tests/integration-tests/videos
          if-no-files-found: ignore

      - uses: actions/upload-artifact@v4
        if: success() || failure()
        with:
          name: cypress-screenshots-${{ matrix.shard_index }}
          path: cypress-tests/integration-tests/screenshots
          if-no-files-found: ignore

      # Final result for this shard
      - name: Final Pass/Fail
        if: success() || failure()
        run: |
          if [[ "${{ steps.int-tests.outcome }}" != "success" && "${{ steps.shard.outputs.specs }}" != "" ]]; then
            echo "Shard ${{ matrix.shard_index }} failed!"
            exit 1
          fi
          echo "Shard ${{ matrix.shard_index }} passed or had no tests."

  visual_regression_tests:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read

    services:
      redis:
        image: redis
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          cache: 'npm'

      # Reuse the dist + node_modules built in the 'build' job
      - uses: actions/download-artifact@v4
        with:
          name: dpr-package
          # extract into repo root so dist/ and node_modules/ are in place
          path: .

      # Fix node_module permissions
      - name: Fix executable permissions in node_modules
        run: |
          find node_modules -type f -name "esbuild" -exec chmod +x {} \;
          find node_modules -type f -path "*/@esbuild/*/bin/*" -exec chmod +x {} \;

      # optionally rebuild native modules — safe & fast
      - run: npm rebuild

      # Count screenshots BEFORE running tests
      - name: Count screenshots before
        id: count-screenshots-before
        run: |
          echo -n "screenshots_before=$(find src/dpr/components/_dashboards/visual-regression-tests \
            -name '*.png' | wc -l | tr -d '[:space:]')" >> "$GITHUB_OUTPUT"

      # Install Playwright dependencies
      - name: Install Playwright dependencies
        run: |
          sudo apt update
          npx playwright install --with-deps

      # Run the visual regression tests for dashboards
      - name: Run visual regression tests
        run: npm run int-test-visual:ci

      # Count screenshots AFTER and compare
      - name: Count screenshots after
        id: count-screenshots-after
        run: |
          echo "screenshots before: ${{ steps.count-screenshots-before.outputs.screenshots_before }}"
          screenshots_after=$(find src/dpr/components/_dashboards/visual-regression-tests \
            -name '*.png' | wc -l | tr -d '[:space:]')
          echo "screenshots after: $screenshots_after"

          screenshot_diff=$((${{ steps.count-screenshots-before.outputs.screenshots_before }} - screenshots_after))

          if [ $screenshot_diff -eq 0 ]; then
            exit 0
          else
            exit 1
          fi

      - name: Package screenshots
        if: success() || failure()
        run: |
          mkdir screenshots
          find src/dpr/components/_dashboards/visual-regression-tests \
            -name '*.png' -exec cp {} screenshots \;

      - uses: actions/upload-artifact@v4
        name: Upload screenshots artifact
        if: success() || failure()
        with:
          name: vrt-screenshots
          path: screenshots

      - uses: actions/upload-artifact@v4
        name: Upload Playwright test results
        if: success() || failure()
        with:
          name: vrt-test-results
          path: test-results

      - name: Output success or failure
        if: success() || failure()
        run: |
          if [[ "${{ steps.count-screenshots-after.outcome }}" != "success" ]]; then
            echo 'Visual regression test screenshots number changed - new tests likely added!'
            exit 1
          else
            exit 0
          fi
