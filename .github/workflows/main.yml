name: Build and test package

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  HOME_URL: 'http://localhost:3010/embedded/platform/'
  REQUEST_URL: 'http://localhost:3010/embedded/platform/async/report/request-examples/request-example-success/request'
  POLLING_URL: 'http://localhost:3010/embedded/platform/async/report/request-examples/request-example-success/request/exId_1729765628165'
  REPORT_URL: 'http://localhost:3010/embedded/platform/async/report/request-examples/request-example-success/request/tblId_1729765628165/report'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24.x'
      - run: npm run setup
      - run: npm run rpack
      - uses: actions/upload-artifact@v4
        with:
          name: dpr-package
          path: dist

  test:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24.x'
      - run: npm run setup
      - uses: actions/download-artifact@v4
        with:
          name: dpr-package
          path: dist
      - run: npm run test

  test_with_app:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    services:
      redis:
        image: redis
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22.x'
      - run: npm run setup

      - name: Clone mi-ui
        run: |
          git clone https://github.com/ministryofjustice/hmpps-digital-prison-reporting-mi-ui.git ../app
      - name: mi-ui setup using this branch
        run: npm run setup
        working-directory: ${{ github.workspace }}/../app
      - name: Build lib and copy output into node_modules of mi-ui for lib
        working-directory: ${{ github.workspace }}
        run: |
          npm run rpack
          rm -rf ../app/node_modules/@ministryofjustice/hmpps-digital-prison-reporting-frontend/*
          cp -R dist/* ../app/node_modules/@ministryofjustice/hmpps-digital-prison-reporting-frontend/
      - name: Build mi-ui
        run: npm run build
        working-directory: ${{ github.workspace }}/../app
      - name: mi-ui unit tests
        run: npm run test:ci
        working-directory: ${{ github.workspace }}/../app
      - name: Get wiremock
        run: curl -o wiremock.jar https://repo1.maven.org/maven2/com/github/tomakehurst/wiremock-standalone/2.27.1/wiremock-standalone-2.27.1.jar
        working-directory: ${{ github.workspace }}/../app
      - name: Run wiremock
        run: java -jar wiremock.jar --port 9091 &
        working-directory: ${{ github.workspace }}/../app
      - name: Run mi-ui
        run: npm run start-feature &
        working-directory: ${{ github.workspace }}/../app
      - name: Wait for mi-ui to start
        run: sleep 5
        working-directory: ${{ github.workspace }}/../app
      - name: mi-ui integration tests
        run: npm run int-test
        working-directory: ${{ github.workspace }}/../app

  integration_tests:
    runs-on: ubuntu-latest
    needs: build

    services:
      redis:
        image: redis
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    strategy:
      matrix:
        shard_index: [0, 1, 2, 3] # adjust shard count as needed

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          cache: 'npm'

      - run: npm ci
      - run: npm run setup
      - run: npm run package

      # Wait for Redis on 6379
      - name: Wait for Redis
        run: |
          echo "Waiting for Redis on tcp:localhost:6379..."
          npx wait-on tcp:localhost:6379 --timeout 60000
          echo "Redis is ready!"

      # SHARD: Find your specs ONLY under the paths you want
      - name: Select spec files for this shard
        id: shard
        shell: bash
        run: |
          set -euo pipefail

          # Collect from ./src and ./test-app (adjust as you need)
          mapfile -t FILES < <(
            ( find ./src -type f -name "*.cy.ts" ;
              find ./test-app -type f -name "*.cy.ts" ) | sort
          )

          TOTAL=${#FILES[@]}
          echo "Found $TOTAL Cypress test files."

          SHARDS=4
          INDEX=${{ matrix.shard_index }}

          SLICE=$(( (TOTAL + SHARDS - 1) / SHARDS ))
          START=$(( INDEX * SLICE ))
          END=$(( START + SLICE ))
          if [ "$END" -gt "$TOTAL" ]; then END=$TOTAL; fi

          if [ "$START" -ge "$TOTAL" ]; then
            echo "Shard $INDEX has no tests."
            echo "specs=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          SELECTED=("${FILES[@]:$START:$((END-START))}")
          SPECS=$(IFS=,; echo "${SELECTED[*]}")

          echo "Shard $INDEX will run ${#SELECTED[@]} test(s):"
          printf " - %s\n" "${SELECTED[@]}"
          echo "specs=$SPECS" >> "$GITHUB_OUTPUT"

      # START APP on a target port, but detect if it ignores the port and sticks to 3010.
      - name: Start server
        id: start-app
        if: steps.shard.outputs.specs != ''
        shell: bash
        env:
          BASE_PORT: 3000
        run: |
          set -euo pipefail

          SHARD_INDEX=${{ matrix.shard_index }}
          TARGET_PORT=$(( BASE_PORT + SHARD_INDEX ))

          # Create a log file to inspect what the app prints
          LOG_FILE="app-${SHARD_INDEX}.log"

          echo "Attempting to start app on TARGET_PORT=$TARGET_PORT"

          # Try all common ways to set the port at once:
          # 1) ENV PORT and APP_PORT
          # 2) CLI '--port' (direct invocation) and '-- --port' (npm passthrough)
          # If your script ignores both, it will likely still bind to 3010.
          PORT=$TARGET_PORT APP_PORT=$TARGET_PORT \
          npm run start:dev:noMockClients:noLogs -- --port "$TARGET_PORT" \
            > "$LOG_FILE" 2>&1 &

          # Give the process a moment to start writing logs
          sleep 2

          echo "---- App log (initial) ----"
          tail -n +1 "$LOG_FILE" | sed -e 's/^/[APP] /'
          echo "---------------------------"

          # Detect which port it actually bound to by scanning the logs
          # Adjust the grep pattern if your log line differs.
          ACTUAL_PORT=""
          if grep -Eo 'port[[:space:]]+([0-9]{2,5})' "$LOG_FILE" | tail -1 >/dev/null 2>&1; then
            ACTUAL_PORT=$(grep -Eo 'port[[:space:]]+([0-9]{2,5})' "$LOG_FILE" | tail -1 | grep -Eo '[0-9]{2,5}')
          fi

          # Fallback: if we couldn't parse the log, try expected port first, then 3010
          if [ -z "${ACTUAL_PORT:-}" ]; then
            echo "Could not parse port from logs; probing $TARGET_PORT then 3010..."
            if npx wait-on "tcp:localhost:$TARGET_PORT" --timeout 1000; then
              ACTUAL_PORT="$TARGET_PORT"
            elif npx wait-on "tcp:localhost:3010" --timeout 1000; then
              ACTUAL_PORT="3010"
            fi
          fi

          # If we parsed a port, wait for that one; else wait for both with timeouts
          if [ -n "${ACTUAL_PORT:-}" ]; then
            echo "Detected ACTUAL_PORT=$ACTUAL_PORT from logs/probe"
            npx wait-on "http://localhost:$ACTUAL_PORT" --timeout 60000
          else
            echo "No ACTUAL_PORT detected—waiting on $TARGET_PORT first, then 3010 as fallback."
            if ! npx wait-on "http://localhost:$TARGET_PORT" --timeout 15000; then
              npx wait-on "http://localhost:3010" --timeout 45000
              ACTUAL_PORT="3010"
            else
              ACTUAL_PORT="$TARGET_PORT"
            fi
          fi

          echo "App is reachable on port $ACTUAL_PORT"
          echo "PORT=$ACTUAL_PORT" >> "$GITHUB_ENV"

      - name: Run Cypress
        id: int-tests
        if: steps.shard.outputs.specs != ''
        env:
          CYPRESS_BASE_URL: http://localhost:${{ env.PORT }}
        run: |
          echo "Running Cypress on baseUrl=$CYPRESS_BASE_URL"
          npx cypress run \
            --browser electron \
            --config "baseUrl=$CYPRESS_BASE_URL" \
            --spec "${{ steps.shard.outputs.specs }}"

      # Upload logs regardless of outcome so we can inspect ports next time
      - name: Upload app logs
        if: success() || failure()
        uses: actions/upload-artifact@v4
        with:
          name: app-logs-${{ matrix.shard_index }}
          path: app-${{ matrix.shard_index }}.log
          if-no-files-found: ignore

      - uses: actions/upload-artifact@v4
        if: success() || failure()
        with:
          name: cypress-results-${{ matrix.shard_index }}
          path: test_results
          if-no-files-found: ignore

      - uses: actions/upload-artifact@v4
        if: success() || failure()
        with:
          name: cypress-videos-${{ matrix.shard_index }}
          path: cypress-tests/integration-tests/videos
          if-no-files-found: ignore

      - uses: actions/upload-artifact@v4
        if: success() || failure()
        with:
          name: cypress-screenshots-${{ matrix.shard_index }}
          path: cypress-tests/integration-tests/screenshots
          if-no-files-found: ignore

      - name: Final Pass/Fail
        if: success() || failure()
        run: |
          if [[ "${{ steps.int-tests.outcome }}" != "success" && "${{ steps.shard.outputs.specs }}" != "" ]]; then
            echo "Integration tests FAILED for shard ${{ matrix.shard_index }}!"
            exit 1
          fi
          echo "Shard ${{ matrix.shard_index }} passed or had no tests."

  visual_regression_tests:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read

    services:
      redis:
        image: redis
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24.x'

      # Same as original workflow
      - run: npm run setup
      - run: npm run package

      # Count screenshots BEFORE running tests
      - name: Count screenshots before
        id: count-screenshots-before
        run: |
          echo -n "screenshots_before=$(find src/dpr/components/_dashboards/visual-regression-tests \
            -name '*.png' | wc -l | tr -d '[:space:]')" >> "$GITHUB_OUTPUT"

      # Install Playwright dependencies
      - name: Install Playwright dependencies
        run: |
          sudo apt update
          npx playwright install --with-deps

      # Run the visual regression tests for dashboards
      - name: Run visual regression tests
        run: npm run int-test-visual:ci

      # Count screenshots AFTER and compare
      - name: Count screenshots after
        id: count-screenshots-after
        run: |
          echo "screenshots before: ${{ steps.count-screenshots-before.outputs.screenshots_before }}"
          screenshots_after=$(find src/dpr/components/_dashboards/visual-regression-tests \
            -name '*.png' | wc -l | tr -d '[:space:]')
          echo "screenshots after: $screenshots_after"

          screenshot_diff=$((${{ steps.count-screenshots-before.outputs.screenshots_before }} - screenshots_after))

          # Identical behavior to original → fail if count changed
          if [ $screenshot_diff -eq 0 ]; then
            exit 0
          else
            exit 1
          fi

      # Package up all screenshots from test run
      - name: Package screenshots
        if: success() || failure()
        run: |
          mkdir screenshots
          find src/dpr/components/_dashboards/visual-regression-tests \
            -name '*.png' -exec cp {} screenshots \;

      # Upload screenshots artifact (pass/fail)
      - uses: actions/upload-artifact@v4
        name: Upload screenshots artifact
        if: success() || failure()
        with:
          name: vrt-screenshots
          path: screenshots

      # Upload Playwright test results
      - uses: actions/upload-artifact@v4
        name: Upload Playwright test results
        if: success() || failure()
        with:
          name: vrt-test-results
          path: test-results

      # Final failure logic (same as original)
      - name: Output success or failure
        if: success() || failure()
        run: |
          if [[ "${{ steps.count-screenshots-after.outcome }}" != "success" ]]; then
            echo 'Visual regression test screenshots number changed - new tests likely added!'
            exit 1
          else
            exit 0
          fi
