name: Build and test package

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

env:
  HOME_URL: 'http://localhost:3010/embedded/platform/'
  REQUEST_URL: 'http://localhost:3010/embedded/platform/async/report/request-examples/request-example-success/request'
  POLLING_URL: 'http://localhost:3010/embedded/platform/async/report/request-examples/request-example-success/request/exId_1729765628165'
  REPORT_URL: 'http://localhost:3010/embedded/platform/async/report/request-examples/request-example-success/request/tblId_1729765628165/report'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: '24.x'
    - run: npm run setup
    - run: npm run rpack
    - uses: actions/upload-artifact@v4
      with:
        name: dpr-package
        path: dist

  test:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24.x'
      - run: npm run setup
      - uses: actions/download-artifact@v4
        with:
          name: dpr-package
          path: dist
      - run: npm run test

  test_with_app:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    services:
      redis:
        image: redis
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22.x'
      - run: npm run setup

      - name: Clone mi-ui
        run: |
          git clone https://github.com/ministryofjustice/hmpps-digital-prison-reporting-mi-ui.git ../app
      - name: mi-ui setup using this branch
        run: npm run setup
        working-directory: ${{ github.workspace }}/../app
      - name: Build lib and copy output into node_modules of mi-ui for lib
        working-directory: ${{ github.workspace }}
        run: |
          npm run rpack
          rm -rf ../app/node_modules/@ministryofjustice/hmpps-digital-prison-reporting-frontend/*
          cp -R dist/* ../app/node_modules/@ministryofjustice/hmpps-digital-prison-reporting-frontend/
      - name: Build mi-ui
        run: npm run build
        working-directory: ${{ github.workspace }}/../app
      - name: mi-ui unit tests
        run: npm run test:ci
        working-directory: ${{ github.workspace }}/../app
      - name: Get wiremock
        run: curl -o wiremock.jar https://repo1.maven.org/maven2/com/github/tomakehurst/wiremock-standalone/2.27.1/wiremock-standalone-2.27.1.jar
        working-directory: ${{ github.workspace }}/../app
      - name: Run wiremock
        run: java -jar wiremock.jar --port 9091 &
        working-directory: ${{ github.workspace }}/../app
      - name: Run mi-ui
        run: npm run start-feature &
        working-directory: ${{ github.workspace }}/../app
      - name: Wait for mi-ui to start
        run: sleep 5
        working-directory: ${{ github.workspace }}/../app
      - name: mi-ui integration tests
        run: npm run int-test
        working-directory: ${{ github.workspace }}/../app
        
  integration_test:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read

    services:
      redis:
        image: redis
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24.x'
      - run: npm run setup
      - run: npm run package

      - name: count number of screenshots for visual regression tests before running
        id: count-screenshots-before
        run: echo -n "screenshots_before=$(find src/dpr/components/_dashboards/visual-regression-tests -name \*.png | wc -l | tr -d '[:space:]')" >> "$GITHUB_OUTPUT"

      - name: Run the visual regression tests for dashboards
        run: |
          npx playwright install --with-deps
          npm run int-test-visual:ci

      - name: count number of screenshots for visual regression tests after running
        id: count-screenshots-after
        run: |
          echo "screenshots before: ${{ steps.count-screenshots-before.outputs.screenshots_before }}"
          screenshots_after=$(find src/dpr/components/_dashboards/visual-regression-tests -name \*.png | wc -l | tr -d '[:space:]')
          echo "screenshots after: $screenshots_after"
          screenshot_diff=$((${{ steps.count-screenshots-before.outputs.screenshots_before }}-$screenshots_after))
          if [ $screenshot_diff -eq 0 ]; then exit 0; else exit 1; fi
      - name: Package up screenshots
        if: success() || failure()
        run: |
          mkdir screenshots
          find src/dpr/components/_dashboards/visual-regression-tests -name \*.png -exec cp {} screenshots \;

      - uses: actions/upload-artifact@v4
        name: Create screenshots artifact
        if: success() || failure()
        with:
          name: screenshots
          path: screenshots

      - uses: actions/upload-artifact@v4
        name: Create playwright test-results artifact
        if: success() || failure()
        with:
          name: test-results
          path: test-results

      - name: Output success or failure
        id: output-visual-regressions
        if: success() || failure()
        run: if [[ ${{ steps.count-screenshots-after.outcome }} != "success" ]]; then echo 'Visual regression test screenshots number changed - new tests likely added!' && exit 1; else exit 0; fi

      - name: Run the node app and integration tests
        id: int-test-step
        run: |
          npm run start:dev:noMockClients:noLogs &
          sleep 5
          npm run int-test
      - uses: actions/upload-artifact@v4
        if: success() || failure()
        with:
          name: test_results
          path: test_results
      - uses: actions/upload-artifact@v4
        if: success() || failure()
        with:
          name: videos
          path: cypress-tests/integration-tests/videos
      - uses: actions/upload-artifact@v4
        if: success() || failure()
        with:
          name: screenshots
          path: cypress-tests/integration-tests/screenshots
      - name: Output success or failure
        id: output
        if: success() || failure()
        run: if [[ ${{ steps.int-test-step.outcome }} != "success" ]]; then echo 'Int tests failed!' && exit 1; else exit 0; fi
