name: Build and test package

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: '24.x'
          cache: 'npm'

      - name: SLSA - supply chain attack mitigation
        uses: ministryofjustice/devsecops-actions/sca/slsa@8c77d3a65a46d1d4b5416eafae5b84371ecd797d

      - run: npm run setup

      # ---- Artifact 1: Build using rpack ----
      - name: Build using rpack
        run: npm run rpack

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        name: Upload rpack artifact
        with:
          name: dpr-package-rpack
          path: dist

      # clean dist to avoid blending outputs if rpack/package differ
      - name: Clean dist
        run: rm -rf dist/*

      # ---- Artifact 2: Build using package ----
      - name: Build using package
        run: npm run package

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: dpr-package-package
          path: |
            dist
            node_modules
            package.json
            package-lock.json

  test:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: '24.x'
          cache: 'npm'

      - name: SLSA - supply chain attack mitigation
        uses: ministryofjustice/devsecops-actions/sca/slsa@8c77d3a65a46d1d4b5416eafae5b84371ecd797d

      - run: npm run setup

      - uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131
        with:
          name: dpr-package-rpack
          path: dist

      - run: npm run test

  test_with_app:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    services:
      redis:
        image: redis
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: '22.x'
          cache: 'npm'

      - name: SLSA - supply chain attack mitigation
        uses: ministryofjustice/devsecops-actions/sca/slsa@8c77d3a65a46d1d4b5416eafae5b84371ecd797d
        with:
          security-patch-package-exclusion: "@ministryofjustice/hmpps-digital-prison-reporting-frontend"
      - run: npm run setup

      - name: Clone mi-ui
        run: |
          git clone https://github.com/ministryofjustice/hmpps-digital-prison-reporting-mi-ui.git ../app

      - name: mi-ui setup using this branch
        run: npm run setup
        working-directory: ${{ github.workspace }}/../app

      - name: Build lib and copy output into node_modules of mi-ui
        working-directory: ${{ github.workspace }}
        run: |
          npm run rpack
          rm -rf ../app/node_modules/@ministryofjustice/hmpps-digital-prison-reporting-frontend/*
          cp -R dist/* ../app/node_modules/@ministryofjustice/hmpps-digital-prison-reporting-frontend/

      - name: Build mi-ui
        run: npm run build
        working-directory: ${{ github.workspace }}/../app

      - name: mi-ui unit tests
        run: npm run test:ci
        working-directory: ${{ github.workspace }}/../app

      - name: Get wiremock
        run: curl -o wiremock.jar https://repo1.maven.org/maven2/com/github/tomakehurst/wiremock-standalone/2.27.1/wiremock-standalone-2.27.1.jar
        working-directory: ${{ github.workspace }}/../app

      - name: Run wiremock
        run: java -jar wiremock.jar --port 9091 --global-response-templating &
        working-directory: ${{ github.workspace }}/../app

      - name: Run mi-ui
        run: npm run start-feature > mi-ui.log 2>&1 &
        working-directory: ${{ github.workspace }}/../app

      - name: Wait for mi-ui to start
        run: sleep 5
        working-directory: ${{ github.workspace }}/../app

      - name: mi-ui integration tests (Cypress)
        run: npm run int-test
        working-directory: ${{ github.workspace }}/../app

      # ---------------------------------------------
      # COLLECT & UPLOAD ARTIFACTS (SAFE PATHS)
      # ---------------------------------------------
      - name: Collect logs & Cypress artifacts
        if: success() || failure()
        run: |
          mkdir -p artifacts/mi-ui
          mkdir -p artifacts/cypress/videos
          mkdir -p artifacts/cypress/screenshots

          # Copy mi-ui app log
          cp ../app/mi-ui.log artifacts/mi-ui/ 2>/dev/null || true

          # Copy WireMock log
          cp ../app/wiremock.log artifacts/mi-ui/ 2>/dev/null || true

          # Copy Cypress videos & screenshots
          cp -R ../app/cypress-tests/integration-tests/videos/* artifacts/cypress/videos/ 2>/dev/null || true
          cp -R ../app/cypress-tests/integration-tests/screenshots/* artifacts/cypress/screenshots/ 2>/dev/null || true

      - name: Upload mi-ui logs
        if: success() || failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: mi-ui-logs
          path: artifacts/mi-ui

      - name: Upload Cypress videos
        if: success() || failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: mi-ui-cypress-videos
          path: artifacts/cypress/videos

      - name: Upload Cypress screenshots
        if: success() || failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: mi-ui-cypress-screenshots
          path: artifacts/cypress/screenshots

  integration_test:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read

    services:
      redis:
        image: redis
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      wiremock:
        image: wiremock/wiremock:latest
        ports:
          - 9091:8080
        env:
          WIREMOCK_OPTIONS: '--global-response-templating'
        options: >-
          --entrypoint "/docker-entrypoint.sh"

    strategy:
      fail-fast: false
      matrix:
        shard_index: [0, 1, 2, 3]

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: '24.x'
          cache: 'npm'

      - name: SLSA - supply chain attack mitigation
        uses: ministryofjustice/devsecops-actions/sca/slsa@8c77d3a65a46d1d4b5416eafae5b84371ecd797d

      # Download dist + node_modules (dpr-package-package)
      - uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131
        with:
          name: dpr-package-package
          path: .

      # Fix lost executable permissions in node_modules
      - name: Fix permissions for native modules
        run: |
          echo "Restoring permissions for native binaries..."
          find node_modules -type f -path "*/@esbuild/*/bin/*" -exec chmod +x {} \;
          chmod -R +x node_modules/.bin || true
          find node_modules -type f -path "*/bin/*" -exec chmod +x {} \; || true
          find node_modules -type f -name "*.node" -exec chmod +x {} \; || true

      - run: npm rebuild

      # Setup tasks required for dev server
      - run: npm run setup

      # Cypress binary install (per runner)
      - name: Install Cypress binary
        run: |
          npx cypress install
          npx cypress verify

      # Wait for Redis
      - name: Wait for Redis
        run: npx wait-on tcp:localhost:6379 --timeout 60000

      # ------------------------------------
      # SHARD SPEC SELECTOR
      # ------------------------------------
      - name: Select spec files for this shard
        id: shard
        shell: bash
        run: |
          set -euo pipefail

          echo "Collecting Cypress spec files..."

          # Correct non-escaped bash process substitution
          mapfile -t FILES < <(
            ( find ./src -type f -name "*.cy.ts";
              find ./test-app -type f -name "*.cy.ts" ) | sort
          )

          echo "=== DEBUG: Found spec files ==="
          printf "%s\n" "${FILES[@]}"
          echo "================================"

          TOTAL=${#FILES[@]}
          SHARDS=4
          INDEX=${{ matrix.shard_index }}

          SLICE=$(( (TOTAL + SHARDS - 1) / SHARDS ))
          START=$(( INDEX * SLICE ))
          END=$(( START + SLICE ))
          [ "$END" -gt "$TOTAL" ] && END="$TOTAL"

          if [ "$START" -ge "$TOTAL" ]; then
            echo "specs=" >> "$GITHUB_OUTPUT"
            echo "Shard $INDEX has no specs."
            exit 0
          fi

          SELECTED=("${FILES[@]:$START:$((END-START))}")

          echo "=== DEBUG: Specs for shard $INDEX ==="
          printf "%s\n" "${SELECTED[@]}"
          echo "====================================="

          SPECS=$(IFS=, ; echo "${SELECTED[*]}")
          echo "specs=$SPECS" >> "$GITHUB_OUTPUT"
          echo "Shard $INDEX specs: $SPECS"

      # ------------------------------------
      # START APP WITH UNBUFFERED LOGGING
      # ------------------------------------
      - name: Start server
        if: steps.shard.outputs.specs != ''
        shell: bash
        env:
          PORT: 3010
        run: |
          echo "Starting app with unbuffered logging via stdbuf + tee..."

          PORT=$PORT npm run start:dev:noMockClients:noLogs \
            -- --no-warnings \
            | stdbuf -o0 -e0 tee app.log &

          echo "Waiting for app to be ready..."
          npx wait-on "tcp:localhost:$PORT" --timeout 60000

          echo "BASE_URL=http://localhost:$PORT" >> "$GITHUB_ENV"
          echo "App started."

      # ------------------------------------
      # CYPRESS EXECUTION
      # ------------------------------------
      - name: Run Cypress
        id: int-tests
        if: steps.shard.outputs.specs != ''
        env:
          CYPRESS_BASE_URL: ${{ env.BASE_URL }}
        run: |
          echo "Running Cypress with baseUrl=$CYPRESS_BASE_URL"
          npx cypress run \
            --browser electron \
            --config "baseUrl=$CYPRESS_BASE_URL" \
            --spec "${{ steps.shard.outputs.specs }}"

      # ------------------------------------
      # ARTIFACTS
      # ------------------------------------

      # App logs (now include ALL runtime logs)
      - name: Upload app log
        if: success() || failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: app-log-${{ matrix.shard_index }}
          path: app.log
          if-no-files-found: ignore

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        if: success() || failure()
        with:
          name: cypress-results-${{ matrix.shard_index }}
          path: test_results
          if-no-files-found: ignore

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        if: success() || failure()
        with:
          name: cypress-videos-${{ matrix.shard_index }}
          path: cypress-tests/integration-tests/videos
          if-no-files-found: ignore

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        if: success() || failure()
        with:
          name: cypress-screenshots-${{ matrix.shard_index }}
          path: cypress-tests/integration-tests/screenshots
          if-no-files-found: ignore

      # Final shard-level pass/fail
      - name: Final Pass/Fail
        if: success() || failure()
        run: |
          if [[ "${{ steps.int-tests.outcome }}" != "success" && "${{ steps.shard.outputs.specs }}" != "" ]]; then
            exit 1
          fi

  vrt_tests:
    name: VRT – Tests (fail on diffs)
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read

    services:
      redis:
        image: redis
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: '24.x'
          cache: 'npm'

      - uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131
        with:
          name: dpr-package-package
          path: .

      - name: Fix permissions for native modules
        run: |
          find node_modules -type f -path "*/@esbuild/*/bin/*" -exec chmod +x {} \;
          chmod -R +x node_modules/.bin || true
          find node_modules -type f -path "*/bin/*" -exec chmod +x {} \; || true
          find node_modules -type f -name "*.node" -exec chmod +x {} \; || true

      - run: npm rebuild

      - name: Install Playwright browsers + deps + fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-liberation fonts-dejavu fonts-noto || true
          npx playwright install --with-deps

      - name: Run visual regression tests (-u missing)
        run: npx playwright test -u missing

      - name: Upload test-results (actual/expected/diff)
        if: success() || failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: vrt-test-results
          path: test-results

      - name: Collect visual diffs (optional)
        if: success() || failure()
        run: |
          mkdir -p visual-diffs
          find test-results -type f \( -name '*-actual.png' -o -name '*-expected.png' -o -name '*-diff.png' \) -exec bash -c 'mkdir -p "visual-diffs/$(dirname "{}" | sed "s#test-results/##")" && cp "{}" "visual-diffs/$(dirname "{}" | sed "s#test-results/##")/"' \;
      - name: Upload visual diffs (optional)
        if: success() || failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: vrt-visual-diffs
          path: visual-diffs

  vrt_update_snapshots:
    name: VRT – Update Baselines (artifact only)
    runs-on: ubuntu-latest
    needs: build
    # Do NOT make this job required in branch protections
    continue-on-error: true
    permissions:
      contents: read
    services:
      redis:
        image: redis
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: '24.x'
          cache: 'npm'

      - uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131
        with:
          name: dpr-package-package
          path: .

      - name: Fix permissions for native modules
        run: |
          find node_modules -type f -path "*/@esbuild/*/bin/*" -exec chmod +x {} \;
          chmod -R +x node_modules/.bin || true
          find node_modules -type f -path "*/bin/*" -exec chmod +x {} \; || true
          find node_modules -type f -name "*.node" -exec chmod +x {} \; || true

      - run: npm rebuild

      - name: Install Playwright browsers + deps + fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-liberation fonts-dejavu fonts-noto || true
          npx playwright install --with-deps

      # PASS 2: regenerate baselines for download
      - name: Generate updated baselines (--update-snapshots)
        run: npx playwright test --update-snapshots

      - name: Package updated baselines
        run: |
          mkdir -p updated-screenshots
          find src/dpr/components/_dashboards/visual-regression-tests -name '*.png' -exec cp --parents {} updated-screenshots \;

      - name: Upload updated baselines
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: vrt-updated-snapshots
          path: updated-screenshots
