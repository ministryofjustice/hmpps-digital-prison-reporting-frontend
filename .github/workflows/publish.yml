name: Publish package

on:
  workflow_dispatch:
    inputs:
      versionType:
        description: "The semantic version segment to increment"
        required: true
        default: feature
        type: choice
        options:
          - major
          - feature
          - bug

jobs:
  publish-package:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "24.x"

      # Ensure npm 11.5.1 or later is installed, to support OIDC publishing
      - name: Update npm
        run: npm install -g npm@latest

      - name: SLSA - supply chain attack mitigation
        uses: ministryofjustice/devsecops-actions/sca/slsa@877a6683738d4643f16c2c306e908bb5ef5487c2

      - run: npm run setup
      - run: npm run rpack

      - name: Get version
        id: get-version
        run: |
          CURRENT_VERSION=$(npm view @ministryofjustice/hmpps-digital-prison-reporting-frontend version)
          echo "Current version: $CURRENT_VERSION"
          echo "current_version=$CURRENT_VERSION" >> "$GITHUB_OUTPUT"

      - name: Bump version
        id: bump-version
        shell: bash
        run: |
          VERSION="${{ steps.get-version.outputs.current_version }}"
          TYPE="${{ inputs.versionType }}"

          if [[ -z "$VERSION" ]]; then
            echo "Failed to determine current version"
            exit 1
          fi

          echo "Current version: $VERSION"
          echo "Bump type: $TYPE"

          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          MAJOR=${MAJOR:-0}
          MINOR=${MINOR:-0}
          PATCH=${PATCH:-0}

          case "$TYPE" in
            major)
              MAJOR=$((MAJOR+1))
              MINOR=0
              PATCH=0
              NEW_VERSION="$MAJOR.$MINOR.$PATCH"
              ;;
            feature)
              MINOR=$((MINOR+1))
              PATCH=0
              NEW_VERSION="$MAJOR.$MINOR.$PATCH"
              ;;
            bug)
              PATCH=$((PATCH+1))
              NEW_VERSION="$MAJOR.$MINOR.$PATCH"
              ;;
            *)
              echo "Unknown version type: $TYPE"
              exit 1
              ;;
          esac

          echo "Next version: $NEW_VERSION"
          echo "next-version=$NEW_VERSION" >> "$GITHUB_OUTPUT"

      - name: Set version
        run: sed -i -e 's/9999.9999.9999/${{ steps.bump-version.outputs.next-version }}/' dist/package.json

      - name: Publish
        run: npm publish ./dist --access public

  publish-pages:
    runs-on: ubuntu-latest

    permissions:
      pages: write
      id-token: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "24.x"
      - run: npm run setup
      - run: npm run docs
      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa
        with:
          path: dist-docs/dpr/
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128
