name: Publish package

on:
  workflow_dispatch:
    inputs:
      versionType:
        description: "The semantic version segment to increment"
        required: true
        default: feature
        type: choice
        options:
          - major
          - feature
          - bug

jobs:
  publish-package:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "24.x"

      # Ensure npm 11.5.1 or later is installed, to support OIDC publishing
      - name: Update npm
        run: npm install -g npm@latest

      - name: SLSA - supply chain attack mitigation
        uses: ministryofjustice/devsecops-actions/sca/slsa@e3c63a5986ea6e7d57d38b7f72e5b8cf08dc7020

      - run: npm run setup
      - run: npm run rpack

      - name: Get version
        id: get-version
        run: |
          CURRENT_VERSION=$(npm view @ministryofjustice/hmpps-digital-prison-reporting-frontend version)
          echo "Current version: $CURRENT_VERSION"
          echo "current_version=$CURRENT_VERSION" >> "$GITHUB_OUTPUT"

      - name: Bump version
        id: bump-version
        uses: christian-draeger/increment-semantic-version@4ac542a8ebf91f4edc224cbe3a19cc086826ae77
        with:
          current-version: ${{ steps.get-version.outputs.current_version }}
          version-fragment: ${{ inputs.versionType }}

      - name: Set version
        run: sed -i -e 's/9999.9999.9999/${{ steps.bump-version.outputs.next-version }}/' dist/package.json

      - name: Publish
        run: npm publish ./dist --access public

  publish-pages:
    runs-on: ubuntu-latest

    permissions:
      pages: write
      id-token: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "24.x"
      - run: npm run setup
      - run: npm run docs
      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa
        with:
          path: dist-docs/dpr/
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e
